services:
  postgres:
    image: postgres:15-alpine
    container_name: sta-postgres
    environment:
      POSTGRES_DB: sta
      POSTGRES_USER: sta_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - sta-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sta_user -d sta"]
      interval: 5s
      timeout: 3s
      retries: 5

  samba-ad:
    image: nowsci/samba-domain
    container_name: sta-samba-ad
    hostname: dc1
    domainname: sta.local
    environment:
      DOMAIN: STA.LOCAL
      DOMAINPASS: S3nh@Adm!n2026
      DNSFORWARDER: 8.8.8.8
      HOSTIP: 172.20.0.10
    ports:
      - "389:389"      # LDAP
      - "636:636"      # LDAPS
    volumes:
      - samba-data:/var/lib/samba
      - samba-config:/etc/samba/external
    networks:
      sta-net:
        ipv4_address: 172.20.0.10
    privileged: true
    restart: unless-stopped

  sftp-test:
    image: atmoz/sftp
    container_name: sta-sftp-test
    command: stauser:StaTest2026:1001
    ports:
      - "2222:22"
    volumes:
      - sftp-upload:/home/stauser/upload
      - sftp-retorno:/home/stauser/retorno
    restart: unless-stopped

volumes:
  sta-pgdata:
  samba-data:
  samba-config:
  sftp-upload:
  sftp-retorno:

networks:
  sta-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
