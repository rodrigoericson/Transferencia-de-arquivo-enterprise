name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/STA.Web/package-lock.json

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Frontend Build
        run: |
          cd src/STA.Web
          npm ci
          npm run build

  publish:
    needs: build-and-test
    runs-on: windows-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/STA.Web/package-lock.json

      - name: Publish API (self-contained)
        run: dotnet publish src/STA.Api -c Release -r win-x64 --self-contained -o publish/api

      - name: Publish Worker (self-contained)
        run: dotnet publish src/STA.Worker -c Release -r win-x64 --self-contained -o publish/worker

      - name: Build Frontend
        run: |
          cd src/STA.Web
          npm ci
          npm run build

      - name: Copy Frontend dist
        run: Copy-Item -Path src/STA.Web/dist -Destination publish/web -Recurse

      - name: Copy Scripts
        run: Copy-Item -Path scripts -Destination publish/scripts -Recurse

      - name: Copy Config Template
        run: Copy-Item -Path config -Destination publish/config -Recurse

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tae-sta-release
          path: publish/
          retention-days: 30

      - name: Package Release ZIP
        if: startsWith(github.ref, 'refs/tags/v')
        run: Compress-Archive -Path publish/* -DestinationPath tae-sta-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tae-sta-${{ github.ref_name }}.zip
          generate_release_notes: true
          body: |
            ## TAE-STA ${{ github.ref_name }}

            ### Instalação
            1. Baixe o arquivo `tae-sta-${{ github.ref_name }}.zip`
            2. Extraia em pasta temporária
            3. Execute `scripts\Install-TAE-STA.ps1` como Administrador

            ### Atualização
            1. Baixe o arquivo `tae-sta-${{ github.ref_name }}.zip`
            2. Extraia em pasta temporária
            3. Execute `scripts\Update-TAE-STA.ps1 -SourcePath .\`

            ### Requisitos
            - Windows Server 2019+ (ou Windows 10/11 Pro)
            - PostgreSQL 15+
            - 7-Zip instalado
