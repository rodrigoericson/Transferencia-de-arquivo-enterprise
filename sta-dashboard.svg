    <rect x="660" y="179" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="179" width="220" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="192" fill="#55ff55" font-size="13">7/7</text>

    <text x="540" y="222" fill="#7dffb3">ENDPOINTS</text>
    <rect x="660" y="209" width="220" height="11" rx="2" fill="#1a1a1a"/>
    <rect x="660" y="209" width="220" height="11" rx="2" fill="#00ff66"/>
