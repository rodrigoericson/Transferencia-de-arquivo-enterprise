  <text x="750" y="410" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_sistema</text>
  <text x="750" y="427" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_parametro_sistema</text>
