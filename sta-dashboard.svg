  <text x="750" y="478" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_rota_destino</text>
  <text x="750" y="495" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_log_processo</text>
  <text x="750" y="512" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_log_arquivo</text>
  <text x="750" y="529" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">├─ tbl_usuario</text>
  <text x="750" y="546" fill="#555" font-size="11" font-family="JetBrains Mono, Consolas, monospace">└─ tbl_auditoria</text>

