<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="960" viewBox="0 0 1000 960">

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .cursor { animation: blink 1.2s step-end infinite; }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    .wip-bar { animation: pulse 2.5s ease-in-out infinite; }
  </style>

  <defs>
    <linearGradient id="bgMain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#040404"/>
    </linearGradient>
    <filter id="glowMain">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bgMain)"/>
  <rect x="8" y="8" width="984" height="904" rx="6" fill="none" stroke="#00ff88" stroke-width="1.5"/>

  <!-- CABEÇALHO -->
  <text x="30" y="40" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" filter="url(#glowMain)">CENTRAL DE CONTROLE TAE-STA</text>
  <text x="430" y="40" fill="#7dffb3" font-size="22" font-family="JetBrains Mono, Consolas, monospace" class="cursor">_</text>
  <text x="720" y="40" fill="#555" font-size="13" font-family="JetBrains Mono, Consolas, monospace">Transferência de Arquivos Enterprise</text>
  <text x="940" y="40" fill="#00ff66" font-size="14" font-family="JetBrains Mono, Consolas, monospace">v7.0</text>
  <line x1="20" y1="52" x2="980" y2="52" stroke="#00ff8855"/>

  <!-- MÓDULOS + MÉTRICAS -->
