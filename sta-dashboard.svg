    <rect x="660" y="89" width="220" height="11" rx="2" fill="#00ff66"/>
    <text x="900" y="102" fill="#55ff55" font-size="13">79/79</text>

    <text x="540" y="132" fill="#7dffb3">FASES</text>
    <rect x="660" y="119" width="220" height="11" rx="2" fill="#1a1a1a"/>
